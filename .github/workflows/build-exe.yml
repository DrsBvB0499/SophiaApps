name: Build CodeAap Windows EXE

on:
  push:
    branches: ["claude/codeaap-kids-app-QcnBO", "main"]
    paths:
      - "codeaap/**"
      - ".github/workflows/build-exe.yml"
  workflow_dispatch:   # lets you trigger it manually from the GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: codeaap
        run: |
          pip install pygame==2.5.2
          pip install pyinstaller==6.9.0

      - name: Build with PyInstaller
        working-directory: codeaap
        run: pyinstaller codeaap.spec --clean --noconfirm

      - name: Smoke-test the EXE launches
        working-directory: codeaap
        shell: pwsh
        run: |
          # Launch the exe with a dummy display flag, let it run 3 s, then kill.
          # If it crashes immediately the exit code will be non-zero.
          $env:SDL_VIDEODRIVER = "dummy"
          $env:SDL_AUDIODRIVER = "dummy"
          $proc = Start-Process -FilePath "dist\CodeAap\CodeAap.exe" `
                    -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 3
          if ($proc.HasExited -and $proc.ExitCode -ne 0) {
            Write-Error "EXE exited with code $($proc.ExitCode)"
            exit 1
          }
          $proc | Stop-Process -Force -ErrorAction SilentlyContinue
          Write-Host "Smoke test passed"

      - name: Zip the output folder
        working-directory: codeaap
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\CodeAap\*" `
                           -DestinationPath "CodeAap-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeAap-Windows
          path: codeaap/CodeAap-Windows.zip
          retention-days: 30
